# Publish the Passant bindings (passant/) to PyPI as data-flow-control.
#
# Manual only: run from Actions → Publish to PyPI → Run workflow.
# Uses PyPI trusted publishing (OIDC); no PYPI_API_TOKEN secret required.
name: Publish to PyPI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          # Native x86_64: build on the runner (no quay.io Docker pull).
          # --compatibility pypi tags wheels for PyPI from host glibc (2.35 on 22.04).
          - runner: ubuntu-22.04
            target: x86_64
            container: off
          - runner: ubuntu-22.04
            target: x86
            manylinux: 2_28
          - runner: ubuntu-22.04
            target: aarch64
            manylinux: 2_28
          - runner: ubuntu-22.04
            target: armv7
            manylinux: 2_28
          - runner: ubuntu-22.04
            target: s390x
            manylinux: 2_28
          - runner: ubuntu-22.04
            target: ppc64le
            manylinux: 2_28
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: passant
          target: ${{ matrix.platform.target }}
          args: --release --locked --out dist --compatibility pypi
          manylinux: ${{ matrix.platform.manylinux || '2_28' }}
          container: ${{ matrix.platform.container == 'off' && 'off' || '' }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: passant/dist

  musllinux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: passant
          target: ${{ matrix.platform.target }}
          args: --release --locked --out dist --compatibility pypi
          manylinux: musllinux_1_2

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: passant/dist

  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
            python_arch: x64
          - runner: windows-latest
            target: x86
            python_arch: x86
          - runner: windows-11-arm
            target: aarch64
            python_arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: ${{ matrix.platform.python_arch }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: passant
          target: ${{ matrix.platform.target }}
          args: --release --locked --out dist --compatibility pypi

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: passant/dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: passant
          target: ${{ matrix.platform.target }}
          args: --release --locked --out dist --compatibility pypi

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: passant/dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: passant
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: passant/dist

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [linux, musllinux, windows, macos, sdist]
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always dist/*
